  <div id="loader" role="status" aria-live="polite" aria-hidden="false" aria-label="Cargando"
    class="fixed inset-0 bg-white dark:bg-gray-950 z-50 flex items-center justify-center">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-teal-500"></div>
  </div>
  <noscript>
    <style>
      #loader {
        display: none !important;
      }
    </style>
  </noscript>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <script>
    (() => {
      const hide = () => {
        const loader = document.getElementById('loader');
        if (loader) {
          loader.setAttribute('aria-hidden', 'true');
          loader.style.display = 'none';
        }
      };
      if (document.readyState === 'complete') {
        hide();
      } else {
        window.addEventListener('load', hide);
      }
      setTimeout(hide, 3000);
    })();
  </script>
</body>
